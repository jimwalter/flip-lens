name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  extension-lint:
    name: Extension lint (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No build step for the extension; verify every source file parses.
      - name: Syntax-check extension JS
        run: find src -name '*.js' -exec node --check {} +

  server:
    name: Server lint + smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flip
          POSTGRES_PASSWORD: flip
          POSTGRES_DB: flip_lens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flip -d flip_lens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://flip:flip@localhost:5432/flip_lens
      STORAGE_DRIVER: local
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Lint (syntax)
        run: npm run lint
      - name: Migrate
        run: npm run migrate
      - name: Smoke test
        run: npm run test:smoke
